algorithm: sequential
runtime_config_path: engine/algorithms/utils/picknplace.json
checkpoint_path: engine/experiment_models/vfp/ckpts/exp1/epoch_57

model:
  component_config_paths:
    backbone: engine/experiment_models/vfp/model_components/backbone.yaml
    da3: engine/experiment_models/vfp/model_components/da3.yaml
    proprio_projector: engine/experiment_models/vfp/model_components/proprio_projector.yaml
    vqvae_prior: engine/experiment_models/vfp/model_components/vqvae_prior.yaml
    gate: engine/experiment_models/vfp/model_components/gate.yaml
    moe_action_decoder: engine/experiment_models/vfp/model_components/moe_action_decoder.yaml

policy:
  type: vfp
  params:
    num_ode_sim_steps: 5
    state_dim: 48
    action_dim: 24
    num_queries: 40
    num_robot_observations: 40
    num_image_observations: 1
    image_observation_skip: 1
    camera_names: [head, left, right]
    stats_path: engine/experiment_models/vfp/ckpts/exp1/dataset_stats.pkl
    stats_eps: 1e-6
plugins:
  - engine.experiment_models.vfp.vfp
