model:
  component_config_paths:
    backbone:        components/backbone.yaml
    noise_processor: components/noise_processor.yaml
    noise_actor:     components/noise_actor.yaml
    openpi_model:    components/openpi_model.yaml

policy:
  type: dsrl_openpi_policy
  params:
    # Directory containing backbone.pt, noise_processor.pt, noise_actor.pt
    # saved from DSRL training. openpi_model loads its own weights via
    # ckpt_dir inside components/openpi_model.yaml.
    checkpoint_path: /path/to/dsrl/checkpoint
    obs_proprio_history: 50
